name: Build APK

on:
  push:
    branches:
      - build
      - 'build/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Test Rust workspace
        run: cargo test --workspace
      - name: Echo build
        run: echo ready
